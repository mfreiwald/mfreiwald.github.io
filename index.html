<!doctype html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width,minimum-scale=1.0, maximum-scale=1.0" />
    <title>Site Name</title>
    <style>@media screen and (max-device-width:480px){body{-webkit-text-size-adjust:none}}</style>
    <script>
    window.onload = function() {

        var req = new XMLHttpRequest();  
        req.open('GET', 'maz-app://', true);  
        req.send();  
        if (req.status != "200") {
            //  Error
            window.location = 'https://apps.apple.com/de/app/meine-allianz/id1116091166';
        } else {
            window.location = 'maz-app://open';
            
        }
/*
        try {
            console.log("Try to open the app")
            window.location = 'maz-app://open';
        } catch (e) {
            console.log("Catch error, open appstore")
            setTimeout("window.location = 'https://apps.apple.com/de/app/meine-allianz/id1116091166';", 1000);
        }
*/

    }
    </script>
</head>
<body>
 
    <!-- button to Download App for new app users -->
    <form action="https://apps.apple.com/de/app/meine-allianz/id1116091166" target="_blank">
        <input type="submit" value="Download" />
    </form>
 
    <!-- button to Open App to specific screen for existing app users -->
    <form action="maz-app://open" target="_blank">
        <input type="submit" value="Open App" />
    </form>
 
</body>
</html>
